# CI/CD Pipeline for Dev Spaces Connector

default:
  image: node:22-alpine

stages:
  - validate
  - build

.npm-install: &npm-install
  - npm ci --include=dev

lint:
  stage: validate
  needs: []
  before_script: *npm-install
  script:
    - node scripts/fetch-ca-bundle.js
    - npm run lint

typecheck:
  stage: validate
  needs: []
  before_script: *npm-install
  script:
    - node scripts/fetch-ca-bundle.js
    - npx tsc --noEmit

build:
  stage: build
  before_script: *npm-install
  script:
    - npm run compile
    - npm run test -- --passWithNoTests --ci
    - npm run vsix
  artifacts:
    paths:
      - "*.vsix"
    expire_in: 30 days
